<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>June 50kg Pro</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #333; --accent: #2d3436; --ai: #a29bfe; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--text); margin: 0; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 200; letter-spacing: 2px; margin: 0; font-size: 1.4rem; }
        
        .card { background: var(--card); width: 100%; max-width: 360px; border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; box-sizing: border-box; }
        .stats-grid { display: flex; justify-content: space-around; align-items: center; }
        
        /* AI 顧問按鈕 */
        .ai-btn { background: var(--ai); color: white; width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* 輸入區 */
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; margin: 10px 0; }
        .btn-small { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #eee; background: white; font-size: 0.8rem; }
        .btn-small.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 歷史資料 */
        .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }
        .history-date { color: #999; }

        .save-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>JUNE 50KG</h1>
    <p style="font-size: 0.7rem; color: #aaa;">158cm | Goal 50kg</p>
</div>

<div style="width:100%; max-width:360px;">
    <button class="ai-btn" onclick="askAI()">✨ 詢問 AI 減脂顧問</button>
</div>

<div class="card">
    <div class="stats-grid">
        <div style="text-align:center;">
            <span style="font-size: 0.7rem; color: #999;">今日體重</span>
            <input type="number" step="0.1" placeholder="62.0" style="text-align:center; border:none; font-size: 1.5rem; padding:0;">
        </div>
    </div>
</div>

<div class="card">
    <span style="font-size: 0.8rem; font-weight: 600;">今日狀態</span>
    <div class="btn-group">
        <button class="btn-small" onclick="selectTag(this)">乾淨飲食</button>
        <button class="btn-small" onclick="selectTag(this)">有喝蔬菜湯</button>
        <button class="btn-small" onclick="selectTag(this)">有運動</button>
    </div>
    <textarea id="note" placeholder="紀錄心情...（如：今天考會計好累）"></textarea>
    <button class="save-btn" onclick="saveData()">存入歷史紀錄</button>
</div>

<div class="card">
    <span style="font-size: 0.8rem; font-weight: 600;">歷史紀錄 (最近 3 天)</span>
    <div id="history-list">
        <div class="history-item"><span class="history-date">04/24</span> <span>61.8kg</span> <span style="color:green;">✔</span></div>
        <div class="history-item"><span class="history-date">04/23</span> <span>62.1kg</span> <span style="color:red;">✘</span></div>
        <div class="history-item"><span class="history-date">04/22</span> <span>62.3kg</span> <span style="color:green;">✔</span></div>
    </div>
</div>

<script>
    function selectTag(btn) { btn.classList.toggle('active'); }
    
    function askAI() {
        const thoughts = document.getElementById('note').value;
        alert("AI 顧問提醒：\n想吃東西前先喝 300cc 溫水！\n既然妳都親手做了這個網站，就別輕易破功喔！");
        // 這邊可以導向 Gemini 或妳常用的 AI
    }

    function saveData() {
        alert("歷史紀錄已更新！(註：目前為模擬儲存，數據重新整理會重置。若需永久儲存可串接 Google Sheets)");
    }
</script>

</body>
</html>
