<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>June 50kg Diary</title>
    <style>
        :root { --bg: #fdfdfd; --card: #ffffff; --text: #333; --accent: #2d3436; --ai: #a29bfe; --green: #81b29a; --yellow: #f2cc8f; --red: #e07a5f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--text); margin: 0; }
        .card { background: var(--card); width: 100%; max-width: 360px; border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; box-sizing: border-box; }
        .ai-btn { background: var(--ai); color: white; width: 100%; max-width: 360px; padding: 15px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #f0f0f0; border-radius: 12px; box-sizing: border-box; font-size: 1rem; outline: none; background: #fafafa; }
        
        /* 紅綠燈樣式 */
        .light-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .light-tag { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid transparent; background: #f0f0f0; font-size: 0.85rem; font-weight: bold; text-align: center; color: #999; }
        .light-tag.active.g { border-color: var(--green); background: var(--green); color: white; }
        .light-tag.active.y { border-color: var(--yellow); background: var(--yellow); color: white; }
        .light-tag.active.r { border-color: var(--red); background: var(--red); color: white; }

        .save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 15px; font-size: 1rem; font-weight: 600; margin-top: 5px; }
        .history-item { padding: 15px; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; line-height: 1.6; position: relative; }
        .hist-date { font-weight: bold; color: #888; font-size: 0.75rem; }
        .hist-weight { font-size: 1.2rem; font-weight: bold; color: var(--accent); margin: 5px 0; }
        .hist-light { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; color: white; margin-left: 5px; }
        .clear-btn { font-size: 0.7rem; color: #eee; border: none; background: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 style="font-weight: 200; letter-spacing: 2px;">JUNE 50KG</h1>
    <button class="ai-btn" onclick="askAI()">✨ 詢問 AI 顧問</button>

    <div class="card">
        <span style="font-size: 0.75rem; color: #aaa;">今日體重 (kg)</span>
        <input type="number" id="weight" step="0.1" placeholder="62.0" style="text-align:center; font-size: 2rem; border:none; background:none;">
    </div>

    <div class="card">
        <span style="font-size: 0.85rem; font-weight: 600; color: #666; display: block; margin-bottom: 10px;">飲食紅綠燈</span>
        <div class="light-group">
            <button class="light-tag g" onclick="setLight(this, '綠燈')">綠燈</button>
            <button class="light-tag y" onclick="setLight(this, '黃燈')">黃燈</button>
            <button class="light-tag r" onclick="setLight(this, '紅燈')">紅燈</button>
        </div>

        <span style="font-size: 0.85rem; font-weight: 600; color: #666;">運動內容</span>
        <input type="text" id="exercise" placeholder="例如：跑步 30min、瑜伽">

        <span style="font-size: 0.85rem; font-weight: 600; color: #666;">心情筆記</span>
        <textarea id="note" placeholder="今天考完會計的心情..."></textarea>
        
        <button class="save-btn" onclick="saveData()">存入歷史紀錄</button>
    </div>

    <div class="card">
        <span style="font-weight: 600; font-size: 0.9rem;">我的減脂日誌</span>
        <div id="historyList"></div>
        <button class="clear-btn" onclick="clearData()">清空所有紀錄</button>
    </div>

<script>
    let selectedLight = "";

    window.onload = function() { displayHistory(); };

    function setLight(btn, val) {
        document.querySelectorAll('.light-tag').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedLight = val;
    }

    function askAI() {
        const advice = ["158cm 的妳，50kg 是完全可以達成的目標！加油！", "今天的自律，是明天體重計給妳最好的回饋！", "想吃東西前先喝 300cc 溫水！"];
        alert("✨ AI 顧問：\n" + advice[Math.floor(Math.random() * advice.length)]);
    }

    function saveData() {
        const weight = document.getElementById('weight').value;
        const exercise = document.getElementById('exercise').value || "無運動";
        const note = document.getElementById('note').value;
        const date = new Date().toLocaleDateString();

        if(!weight || !selectedLight) { alert('請填寫體重並選擇飲食燈號！'); return; }

        const newData = { date, weight, light: selectedLight, exercise, note };
        let history = JSON.parse(localStorage.getItem('dietHistory')) || [];
        history.unshift(newData);
        localStorage.setItem('dietHistory', JSON.stringify(history));

        alert('儲存成功！');
        displayHistory();
        // 重設輸入
        document.getElementById('weight').value = '';
        document.getElementById('exercise').value = '';
        document.getElementById('note').value = '';
        document.querySelectorAll('.light-tag').forEach(b => b.classList.remove('active'));
        selectedLight = "";
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem('dietHistory')) || [];
        const listDiv = document.getElementById('historyList');
        listDiv.innerHTML = history.length === 0 ? '<p style="color:#ccc; font-size:0.8rem; margin-top:10px;">尚無紀錄</p>' : '';
        
        history.forEach(item => {
            const lightColor = item.light === '綠燈' ? '#81b29a' : (item.light === '黃燈' ? '#f2cc8f' : '#e07a5f');
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span class="hist-date">${item.date}</span>
                <span class="hist-light" style="background:${lightColor}">${item.light}</span>
                <div class="hist-weight">${item.weight} kg</div>
                <div style="font-size:0.8rem; color:#555;">🏃 運動：${item.exercise}</div>
                <div class="hist-note">📝 ${item.note || '無紀錄'}</div>
            `;
            listDiv.appendChild(div);
        });
    }

    function clearData() { if(confirm('確定要清空嗎？')) { localStorage.removeItem('dietHistory'); displayHistory(); } }
</script>

</body>
</html>
