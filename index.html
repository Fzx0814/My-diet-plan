<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>June 50kg Diary</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #333; --accent: #2d3436; --ai: #a29bfe; --green: #81b29a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--text); margin: 0; }
        .card { background: var(--card); width: 100%; max-width: 360px; border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; box-sizing: border-box; }
        .ai-btn { background: var(--ai); color: white; width: 100%; max-width: 360px; padding: 15px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .tag { flex: 1; padding: 10px 5px; border-radius: 10px; border: 1px solid #eee; background: white; font-size: 0.75rem; color: #777; }
        .tag.active { background: var(--accent); color: white; border-color: var(--accent); }
        .save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 15px; font-size: 1rem; font-weight: 600; }
        .history-item { padding: 12px; border-bottom: 1px solid #f8f8f8; font-size: 0.85rem; line-height: 1.5; }
        .hist-date { font-weight: bold; color: var(--accent); margin-right: 10px; }
        .hist-note { color: #666; display: block; font-size: 0.8rem; margin-top: 5px; }
        .clear-btn { font-size: 0.7rem; color: #ccc; border: none; background: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>JUNE 50KG</h1>
    <button class="ai-btn" onclick="askAI()">✨ 詢問 AI 顧問</button>

    <div class="card">
        <span style="font-size: 0.7rem; color: #999;">今日體重 (kg)</span>
        <input type="number" id="weight" step="0.1" placeholder="62.0" style="text-align:center; font-size: 1.8rem;">
    </div>

    <div class="card">
        <div class="btn-group">
            <button class="tag" onclick="this.classList.toggle('active')">乾淨飲食</button>
            <button class="tag" onclick="this.classList.toggle('active')">蔬菜湯</button>
            <button class="tag" onclick="this.classList.toggle('active')">有運動</button>
        </div>
        <textarea id="note" placeholder="記錄今天的心情..."></textarea>
        <button class="save-btn" onclick="saveData()">存入歷史紀錄</button>
    </div>

    <div class="card">
        <span style="font-weight: 600; font-size: 0.85rem;">我的紀錄清單</span>
        <div id="historyList"></div>
        <button class="clear-btn" onclick="clearData()">清空所有紀錄</button>
    </div>

<script>
    // 網頁開啟時自動載入舊紀錄
    window.onload = function() { displayHistory(); };

    function askAI() {
        const advice = ["158cm 的妳，50kg 絕對可以！","喝杯水，冷靜一下，這口不用吃。","國企女孩最自律了！"];
        alert("✨ AI 顧問：\n" + advice[Math.floor(Math.random() * advice.length)]);
    }

    function saveData() {
        const weight = document.getElementById('weight').value;
        const note = document.getElementById('note').value;
        const tags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.innerText).join(', ');
        const date = new Date().toLocaleDateString();

        if(!weight) { alert('請輸入體重！'); return; }

        const newData = { date, weight, tags, note };
        let history = JSON.parse(localStorage.getItem('dietHistory')) || [];
        history.unshift(newData); // 加到最前面
        localStorage.setItem('dietHistory', JSON.stringify(history));

        alert('儲存成功！');
        displayHistory();
        // 清空輸入
        document.getElementById('weight').value = '';
        document.getElementById('note').value = '';
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem('dietHistory')) || [];
        const listDiv = document.getElementById('historyList');
        listDiv.innerHTML = history.length === 0 ? '<p style="color:#ccc; font-size:0.8rem;">尚無紀錄</p>' : '';
        
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span class="hist-date">${item.date}</span> <strong>${item.weight} kg</strong> <span style="font-size:0.7rem; color:#81b29a;">${item.tags}</span><span class="hist-note">${item.note}</span>`;
            listDiv.appendChild(div);
        });
    }

    function clearData() { if(confirm('確定要清空所有紀錄嗎？')) { localStorage.removeItem('dietHistory'); displayHistory(); } }
</script>

</body>
</html>
