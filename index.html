<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>June 50kg Pro</title>
    <style>
        :root { 
            --bg: #f8f9fa; 
            --card: #ffffff; 
            --text: #333; 
            --accent: #2d3436; 
            --ai: #a29bfe; 
            --green: #81b29a;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--text); margin: 0; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 200; letter-spacing: 2px; margin: 0; font-size: 1.4rem; }
        
        .card { background: var(--card); width: 100%; max-width: 360px; border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; box-sizing: border-box; }
        
        /* AI 顧問按鈕 */
        .ai-btn { background: var(--ai); color: white; width: 100%; max-width: 360px; padding: 15px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; margin-bottom: 15px; font-size: 1rem; box-shadow: 0 4px 10px rgba(162, 155, 254, 0.3); }
        
        /* 輸入區 */
        .stats-label { font-size: 0.7rem; color: #999; display: block; margin-bottom: 5px; }
        input[type="number"] { width: 100%; padding: 10px; border: none; border-bottom: 2px solid #eee; text-align: center; font-size: 2rem; color: var(--accent); outline: none; transition: 0.3s; }
        input[type="number"]:focus { border-bottom-color: var(--ai); }
        
        .section-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; display: block; color: #555; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-s { flex: 1; padding: 10px 5px; border-radius: 10px; border: 1px solid #eee; background: white; font-size: 0.75rem; color: #777; transition: 0.3s; }
        .btn-s.active { background: var(--accent); color: white; border-color: var(--accent); }

        textarea { width: 100%; height: 80px; padding: 12px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 0.95rem; background: #fafafa; resize: none; font-family: inherit; }
        
        .save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 15px; font-size: 1rem; font-weight: 600; margin-top: 15px; }

        /* 歷史紀錄 */
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f8f8f8; font-size: 0.85rem; }
        .history-date { color: #999; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="header">
    <h1>JUNE 50KG</h1>
    <p style="font-size: 0.7rem; color: #aaa; margin-top: 5px;">國企系專屬減脂儀表板</p>
</div>

<button class="ai-btn" onclick="askAI()">✨ 詢問 AI 減脂顧問</button>

<div class="card">
    <span class="stats-label">今日體重記錄</span>
    <input type="number" step="0.1" placeholder="62.0">
</div>

<div class="card">
    <span class="section-title">今日狀態</span>
    <div class="btn-group">
        <button class="btn-s" onclick="this.classList.toggle('active')">乾淨飲食</button>
        <button class="btn-s" onclick="this.classList.toggle('active')">有喝蔬菜湯</button>
        <button class="btn-s" onclick="this.classList.toggle('active')">今天有運動</button>
    </div>
    <textarea id="note" placeholder="記錄今天的心情... (例如：今天會計課好累，差點想喝珍奶)"></textarea>
    <button class="save-btn" onclick="saveData()">存入歷史紀錄</button>
</div>

<div class="card">
    <span class="section-title">最近進度回顧</span>
    <div id="history">
        <div class="history-item">
            <span class="history-date">04/24</span>
            <span style="font-weight: 500;">61.8 kg</span>
            <div class="status-dot" style="background: var(--green);"></div>
        </div>
        <div class="history-item">
            <span class="history-date">04/23</span>
            <span style="font-weight: 500;">62.1 kg</span>
            <div class="status-dot" style="background: var(--red);"></div>
        </div>
        <div class="history-item">
            <span class="history-date">04/22</span>
            <span style="font-weight: 500;">62.3 kg</span>
            <div class="status-dot" style="background: var(--green);"></div>
        </div>
    </div>
</div>

<script>
    function askAI() {
        const advice = [
            "158cm 的妳，50kg 是完全可以達成的目標！加油！",
            "剛考完試很累吧？先喝 300cc 溫水，妳只是需要休息，不是需要熱量。",
            "想想 6 月穿上漂亮衣服的樣子，這口宵夜我們先放手好嗎？",
            "今天的自律，是明天體重計給妳最好的回饋！",
            "國企系女孩不只會算產值，還會精算熱量！"
        ];
        const randomAdvice = advice[Math.floor(Math.random() * advice.length)];
        alert("✨ AI 顧問提醒：\n\n" + randomAdvice);
    }

    function saveData() {
        alert("紀錄成功！今天的妳也很努力，繼續保持！");
    }
</script>

</body>
</html>
