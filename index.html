<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>June 50kg Journey</title>
    <style>
        :root {
            --bg: #fafafa;
            --card: #ffffff;
            --text: #444;
            --green: #81b29a;
            --yellow: #f2cc8f;
            --red: #e07a5f;
            --accent: #3d405b;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 30px 20px; color: var(--text); margin: 0; }
        h1 { font-weight: 200; letter-spacing: 3px; margin-bottom: 5px; font-size: 1.5rem; }
        .goal-tag { background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-bottom: 25px; }
        
        .card { background: var(--card); width: 100%; max-width: 350px; border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; box-sizing: border-box; }
        .stats { text-align: center; padding: 10px 0; }
        .val { font-size: 2.5rem; font-weight: 300; display: block; color: var(--accent); }
        .lab { font-size: 0.8rem; color: #aaa; letter-spacing: 1px; }

        .section-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 15px; display: block; color: #666; }
        
        /* 飲食燈號 */
        .light-box { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn { width: 30%; height: 45px; border-radius: 12px; border: none; opacity: 0.15; transition: 0.3s; font-size: 0.8rem; font-weight: bold; }
        .btn.active { opacity: 1; color: white; transform: translateY(-2px); }
        .g { background: var(--green); color: var(--green); }
        .y { background: var(--yellow); color: var(--yellow); }
        .r { background: var(--red); color: var(--red); }

        /* 蔬菜湯開關 */
        .soup-toggle { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px dashed #eee; margin-top: 10px; }
        .soup-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .soup-btn.active { background: var(--green); color: white; }

        /* 輸入框與筆記 */
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #f0f0f0; border-radius: 12px; box-sizing: border-box; font-size: 1rem; background: #fdfdfd; }
        textarea { height: 100px; resize: none; font-family: inherit; }
        
        .save-btn { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 15px; font-size: 1rem; font-weight: 600; margin-top: 10px; transition: 0.3s; }
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h1>JUNE 50KG</h1>
    <div class="goal-tag">目前 62.0kg · 目標 50.0kg</div>

    <div class="card">
        <div class="stats">
            <span class="lab">今日體重</span>
            <input type="number" step="0.1" placeholder="0.0" style="text-align: center; font-size: 2rem; border: none; background: transparent; margin: 0;">
            <span class="lab">KG</span>
        </div>
    </div>

    <div class="card">
        <span class="section-title">飲食與心情紀錄</span>
        <div class="light-box">
            <button class="btn g" onclick="sel(this, '綠燈')">乾淨</button>
            <button class="btn y" onclick="sel(this, '黃燈')">一般</button>
            <button class="btn r" onclick="sel(this, '紅燈')">亂吃</button>
        </div>
        
        <div class="soup-toggle">
            <span style="font-size: 0.85rem;">🍲 哈佛蔬菜湯成就</span>
            <button class="soup-btn" onclick="toggleSoup(this)">未達成</button>
        </div>

        <textarea placeholder="寫下今天的心情或筆記...（例如：今天考完經濟學好累，差點想喝珍奶）"></textarea>
        
        <button class="save-btn" onclick="save()">完成今日打卡</button>
    </div>

    <p style="font-size: 0.7rem; color: #ccc;">建立於 2026 · 專屬於妳的減脂計畫</p>

    <script>
        function sel(e, label){
            document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
            e.classList.add('active');
        }
        function toggleSoup(e){
            e.classList.toggle('active');
            e.innerText = e.classList.contains('active') ? '已達成 ✨' : '未達成';
        }
        function save(){
            alert('記錄成功！今天的妳辛苦了，繼續往 50kg 邁進！');
        }
    </script>
</body>
</html>
